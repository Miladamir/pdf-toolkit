name = "pdf-toolkit"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

# --- ADD THESE LINES ---
# Point Wrangler to the Worker script generated by OpenNext
main = ".worker-next/index.mjs"

# Point Wrangler to the static assets
[assets]
directory = ".worker-next/assets"
binding = "ASSETS"
# -----------------------

# Bindings for R2 Storage
[[r2_buckets]]
binding = "BUCKET" 
bucket_name = "pdf-toolkit-bucket" # Ensure you created this bucket in your dashboard