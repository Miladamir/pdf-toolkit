name = "pdf-toolkit"
compatibility_date = "2026-03-01"
compatibility_flags = ["nodejs_compat"]

# Updated paths for current @opennextjs/cloudflare
main = ".open-next/worker.js"

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# Your existing PDF storage bucket
[[r2_buckets]]
binding = "BUCKET"
bucket_name = "pdf-toolkit-bucket"

# Required for Next.js Incremental Cache (ISR, revalidation, etc.)
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "pdf-toolkit-bucket"