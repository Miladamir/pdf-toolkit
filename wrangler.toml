name = "pdf-toolkit"
compatibility_date = "2026-03-01"   # ← updated
compatibility_flags = ["nodejs_compat"]

main = ".worker-next/index.mjs"

[assets]
directory = ".worker-next/assets"
binding = "ASSETS"

# Your existing PDF storage binding
[[r2_buckets]]
binding = "BUCKET" 
bucket_name = "pdf-toolkit-bucket"

# ← ADD THIS NEW BLOCK (for Next.js caching)
[[r2_buckets]]
binding = "NEXT_INC_CACHE_R2_BUCKET"
bucket_name = "pdf-toolkit-bucket"